name: Daily Auto Trader

on:
  workflow_dispatch:  # Triggered by cron-job.org at 8:35am CT weekdays

jobs:
  auto-trade:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      ALPACA_AUTO_API_KEY: ${{ secrets.ALPACA_AUTO_API_KEY }}
      ALPACA_AUTO_SECRET_KEY: ${{ secrets.ALPACA_AUTO_SECRET_KEY }}
      ALPACA_CLAUDE_API_KEY: ${{ secrets.ALPACA_CLAUDE_API_KEY }}
      ALPACA_CLAUDE_SECRET_KEY: ${{ secrets.ALPACA_CLAUDE_SECRET_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run exit manager
        run: python -m scanner.exit_manager

      - name: Run auto trader
        run: python -m scanner.auto_trader
